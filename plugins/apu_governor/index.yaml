title: A.P.U Automatic Polling Utility
description: >
  Non-blocking API rate throttle for Agent Zero. Enforces configurable cooldown
  delays after every tool execution to prevent 429 errors and quota exhaustion.
  High-compute detection (api/fetch/download/scrape/crawl/stream patterns + runtime > 5s)
  applies a multiplier automatically. Interruptible wake button in the chat bar.
  Cooldown state persists across container restarts. Zero external dependencies.
github: https://github.com/MrTrenchTrucker/apu-governor
tags:
  - automation
  - api
  - tools
  - scheduling
  - rate-limiting
